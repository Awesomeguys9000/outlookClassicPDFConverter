name: Build Outlook Add-in

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Restore NuGet packages
      run: nuget restore AttachmentPdfConverter.sln

    - name: Build solution
      run: msbuild AttachmentPdfConverter.sln /p:Configuration=Release /p:Platform="Any CPU" /p:RegisterForComInterop=false /verbosity:minimal

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: AttachmentPdfConverter
        path: |
          AttachmentPdfConverter/bin/Release/
        retention-days: 30
