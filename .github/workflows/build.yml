name: Build Outlook Add-in

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Office Development Workload
      shell: pwsh
      run: |
        $vsInstallerPath = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vs_installer.exe"
        $vsInstallPath = "${env:ProgramFiles}\Microsoft Visual Studio\2022\Enterprise"
        
        Write-Host "Installing Office development workload..."
        & $vsInstallerPath modify `
          --installPath $vsInstallPath `
          --add Microsoft.VisualStudio.Workload.Office `
          --quiet --norestart --wait
        
        Write-Host "Office development workload installed."

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Restore NuGet packages
      run: nuget restore AttachmentPdfConverter.sln

    - name: Build solution
      run: msbuild AttachmentPdfConverter.sln /p:Configuration=Release /p:Platform="Any CPU" /p:RegisterForComInterop=false /verbosity:minimal

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: AttachmentPdfConverter
        path: |
          AttachmentPdfConverter/bin/Release/
        retention-days: 30
